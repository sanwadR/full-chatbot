name: Deploy to Hugging Face Spaces

on:
  push:
    branches: [main]
    paths:
      - "app.py"
      - "main.py"
      - "mcp_server.py"
      - "requirements.txt"
      - "Dockerfile"
  pull_request:
    branches: [main] # ← runs validate when PR targets main
    paths:
      - "app.py"
      - "main.py"
      - "mcp_server.py"
      - "requirements.txt"
      - "Dockerfile"
      - "chainlit.md"

jobs:
  # Job 1: Lint & Validate — runs on BOTH pull_request AND push to main
  validate:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 app.py main.py mcp_server.py --max-line-length=120 --exit-zero

      - name: Verify files are valid Python
        run: |
          python -m py_compile app.py
          python -m py_compile main.py
          python -m py_compile mcp_server.py
          echo "✅ All files compiled successfully!"

  # Job 2: Deploy — runs ONLY when merged/pushed to main (not on PRs)
  deploy:
    name: Deploy to HF Spaces
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' # ← key condition

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install huggingface_hub

          git config --global user.email "ci-bot@github.com"
          git config --global user.name "GitHub Actions"

          git clone https://user:$HF_TOKEN@huggingface.co/spaces/Sanwad/my-chatbot hf-space

          cp app.py hf-space/
          cp main.py hf-space/
          cp mcp_server.py hf-space/
          cp requirements.txt hf-space/
          cp Dockerfile hf-space/

          cd hf-space
          git add .
          git diff --cached --quiet || git commit -m "Deploy from GitHub Actions - ${{ github.sha }}"
          git push
