name: Deploy to Hugging Face Spaces

on:
  push:
    branches: [main]
    # Only trigger when these files change (the ones HF Space needs)
    paths:
      - "app.py"
      - "main.py"
      - "mcp_server.py"
      - "requirements.txt"
      - "Dockerfile"
      - "chainlit.md"

jobs:
  # Job 1: Lint & Validate (gate check — if this fails, no deploy)
  validate:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 app.py main.py mcp_server.py --max-line-length=120 --exit-zero

      - name: Verify files are valid Python
        run: |
          python -m py_compile app.py
          python -m py_compile main.py
          python -m py_compile mcp_server.py
          echo "✅ All files compiled successfully!"

  # Job 2: Deploy to HF Spaces (only runs if validate succeeds)
  deploy:
    name: Deploy to HF Spaces
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Install huggingface_hub CLI
          pip install huggingface_hub

          # Configure git identity
          git config --global user.email "ci-bot@github.com"
          git config --global user.name "GitHub Actions"

          # Clone the HF Space repo using token
          git clone https://user:$HF_TOKEN@huggingface.co/spaces/Sanwad/my-chatbot hf-space

          # Copy only the required files into the cloned HF repo
          cp app.py hf-space/
          cp main.py hf-space/
          cp mcp_server.py hf-space/
          cp requirements.txt hf-space/
          cp Dockerfile hf-space/
          cp chainlit.md hf-space/

          # Commit and push to HF Spaces
          cd hf-space
          git add .
          git diff --cached --quiet || git commit -m "Deploy from GitHub Actions - ${{ github.sha }}"
          git push
